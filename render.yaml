services:
  - type: web
    name: trip-planner
    env: python
    plan: free
    disk:
      name: trip-planner-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Main.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: trip-planner.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://trip-planner.onrender.com
      - key: RENDER_EXTERNAL_HOSTNAME
        value: trip-planner.onrender.com
