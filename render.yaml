services:
  - type: web
    name: trip-planner
    env: python
    plan: free
    disk:
      name: trip-planner-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Main.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: trip-planner.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://trip-planner.onrender.com
      - key: RENDER_EXTERNAL_HOSTNAME
        value: trip-planner.onrender.com
      - key: USE_CLOUDFLARE_R2
        value: "False"
      - key: CLOUDFLARE_MEDIA_DOMAIN
        value: media.yourdomain.com
      - key: CLOUDFLARE_R2_BUCKET_NAME
        value: trip-planner-media
      - key: CLOUDFLARE_R2_ENDPOINT_URL
        value: https://your-account-id.r2.cloudflarestorage.com
      - key: CLOUDFLARE_R2_MEDIA_LOCATION
        value: uploads
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
