<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Sri Narpavi Holidays fallback hero image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#253018" />
      <stop offset="52%" stop-color="#4E5B31" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#11160d" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#11160d" stop-opacity="0.15" />
