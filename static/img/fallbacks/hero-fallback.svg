  <g fill="#ffffff" fill-opacity="0.9" font-family="Manrope, Segoe UI, sans-serif">
    <text x="160" y="470" font-size="54" font-weight="700" letter-spacing="1.5">Sri Narpavi Holidays</text>
    <text x="160" y="545" font-size="34" font-weight="500">Premium journeys, curated with care.</text>
